name: Price Monitor

on:
  schedule:
    # Запуск каждый час (минута 5)
    - cron: '5 * * * *'
  workflow_dispatch:  # чтобы можно было запустить вручную

jobs:
  check_price:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run price parser
        run: python test_parser_ps5_slim.py

      - name: Save price cache (optional)
        uses: actions/upload-artifact@v4
        with:
          name: price_cache
          path: price_cache.txt
